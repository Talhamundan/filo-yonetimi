version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: filo_postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: filo_sifre_2026
      POSTGRES_DB: filo_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: