version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: filo_postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: filo_sifre_2026
      POSTGRES_DB: filo_db
      DATABASE_URL: postgresql://admin:filo_sifre_2026@localhost:5432/filo_db?schema=public
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: filo_app
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://admin:filo_sifre_2026@db:5432/filo_db?schema=public
      UPLOADS_DIR: /uploads
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/uploads

volumes:
  db_data:
  uploads_data:
